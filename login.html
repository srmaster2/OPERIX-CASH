<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OPERIX — تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="login.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="security.js"></script>
  <script src="config.js"></script>
</head>
<body>

<!-- Preloader -->
<div id="preloader">
  <div class="loader-content">
    <div class="spinner"></div>
    <span class="loader-text">OPERIX</span>
  </div>
</div>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<button class="theme-btn" onclick="toggleTheme()" title="تبديل المظهر">
  <i class="fa fa-moon" id="themeIco"></i>
</button>

<div class="card">
  <div class="glow-bar"></div>

  <!-- اللوجو -->
  <div class="logo-box">
    <div class="brand-wordmark">
      <span class="letter letter-x">X</span>
      <span class="letter">I</span>
      <span class="letter">R</span>
      <span class="letter">E</span>
      <span class="letter">P</span>
      <span class="letter">O</span>
    </div>
    <div class="brand-tagline">Financial Operations Platform</div>
  </div>

  <!-- التابات -->
  <div class="tabs-main">
    <button class="tab-btn active" id="btn-tab-login" onclick="switchTab('login')">
      <i class="fa fa-right-to-bracket"></i>دخول
    </button>
    <button class="tab-btn green-tab" id="btn-tab-register" onclick="switchTab('register')">
      <i class="fa fa-building"></i>شركة جديدة
    </button>
    <button class="tab-btn purple-tab" id="btn-tab-invite" onclick="switchTab('invite')">
      <i class="fa fa-envelope-open-text"></i>دعوة
    </button>
  </div>

  <!-- TAB 1: تسجيل الدخول -->
  <div class="tab-content active" id="tab-login">
    <div class="field">
      <label>البريد الإلكتروني</label>
      <div class="inp-wrap">
        <input type="email" id="loginEmail" placeholder="user@example.com" autocomplete="email">
        <i class="fa fa-envelope ico"></i>
      </div>
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <div class="inp-wrap">
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        <i class="fa fa-lock ico"></i>
        <button class="eye-btn" type="button" onclick="toggleEye('loginPassword',this)">
          <i class="fa fa-eye"></i>
        </button>
      </div>
      <a href="javascript:void(0)" class="forgot" onclick="forgotPassword()">
        <i class="fa fa-key" style="font-size:9px;margin-left:3px;"></i>نسيت كلمة المرور؟
      </a>
    </div>
    <button class="btn-go btn-blue" id="btnLogin" onclick="login()">
      <i class="fa fa-bolt" style="margin-left:8px;"></i>دخول
    </button>
  </div>

  <!-- TAB 2: تسجيل شركة -->
  <div class="tab-content" id="tab-register">
    <div style="text-align:center;margin-bottom:14px;">
      <span class="trial-badge">
        <i class="fas fa-gift"></i> تجريبي مجاني 7 أيام · بدون بطاقة ائتمان
      </span>
    </div>
    <div class="field">
      <label>اسم الشركة</label>
      <div class="inp-wrap">
        <input type="text" id="regCompanyName" placeholder="" class="green-focus">
        <i class="fas fa-building ico"></i>
      </div>
    </div>
    <div class="divider">بيانات المدير المسؤول</div>
    <div class="field">
      <label>الاسم الكامل</label>
      <div class="inp-wrap">
        <input type="text" id="regOwnerName" placeholder="اسم المدير" class="green-focus">
        <i class="fas fa-user ico"></i>
      </div>
    </div>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <div class="inp-wrap">
        <input type="email" id="regEmail" placeholder="owner@company.com" class="green-focus">
        <i class="fas fa-envelope ico"></i>
      </div>
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <div class="inp-wrap">
        <input type="password" id="regPassword" placeholder="8 أحرف على الأقل" class="green-focus">
        <i class="fas fa-lock ico"></i>
        <button class="eye-btn" type="button" onclick="toggleEye('regPassword',this)">
          <i class="fa fa-eye"></i>
        </button>
      </div>
    </div>
    <div class="field">
      <label>تأكيد كلمة المرور</label>
      <div class="inp-wrap">
        <input type="password" id="regPasswordConfirm" placeholder="أعد كتابة كلمة المرور" class="green-focus">
        <i class="fas fa-lock ico"></i>
      </div>
    </div>
    <button class="btn-go btn-green" id="btnRegister" onclick="registerCompany()">
      <i class="fas fa-rocket" style="margin-left:8px;"></i>إنشاء الشركة والبدء
    </button>
  </div>

  <!-- TAB 3: قبول دعوة -->
  <div class="tab-content" id="tab-invite">
    <div id="invite-content">
      <div class="loading-state">
        <i class="fas fa-circle-notch fa-spin"></i>
        <p>جاري التحقق من الدعوة...</p>
      </div>
    </div>
  </div>

  <div class="card-foot">OPERIX &copy; 2025 — كل شغلك في نظام واحد</div>
</div>

<div id="toast" class="toast"></div>

<script src="login.js"></script>
</body>
</html>
